# Use zig as the linker for cross-compilation targets so plain `cargo build
# --target=...` matches what `cargo zigbuild` would produce. The `just` recipes
# call `cargo zigbuild` directly and don't strictly need this, but keeping it
# here means ad-hoc cross builds Just Work without remembering to swap commands.

[target.x86_64-unknown-linux-gnu]
linker = "cargo-zigbuild"

[target.aarch64-unknown-linux-gnu]
linker = "cargo-zigbuild"

[target.x86_64-pc-windows-gnu]
linker = "cargo-zigbuild"
