# Use zig as the linker when cross-compiling to these targets from a different
# host (e.g. macOS → Linux/Windows). These entries only apply when the target
# is explicitly passed to cargo; they do NOT affect native builds on Linux CI
# because x86_64-unknown-linux-gnu is that host's default target and is not
# listed here.

[target.aarch64-unknown-linux-gnu]
linker = "cargo-zigbuild"

[target.x86_64-pc-windows-gnu]
linker = "cargo-zigbuild"
