  "RUSTSEC-2025-0052",

  # instant unmaintained — transitive via gpui → util → futures-lite → fastrand.
  # Review by: 2026-08-01.
  "RUSTSEC-2024-0384",

  # paste unmaintained — transitive via gpui → image/metal.
  # Review by: 2026-08-01.
  "RUSTSEC-2024-0436",
]
