# Security audit suppression configuration.
# cargo-audit 0.22.x reads this file only via --config; the just `audit` recipe passes --ignore directly.
# This file serves as a documented record of accepted advisories.
#
# RUSTSEC-2025-0134: rustls-pemfile 2.2.0 is unmaintained.
# Dependency chain: gpui 0.2.2 → gpui_http_client → zed-reqwest 0.12.15-zed → rustls-pemfile.
# No patch is available: gpui 0.2.2 is the latest on crates.io; zed-industries/reqwest (master)
# has not removed the dependency; no API-compatible replacement crate exists.
# The advisory carries no CVE and describes no active exploit — strictly an "unmaintained" flag.
# Revisit when a new gpui crates.io release resolves the transitive chain.
[advisories]
ignore = ["RUSTSEC-2025-0134"]
