[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
  { id = "RUSTSEC-2025-0134", reason = "Transitive via gpui; review by 2026-08-01" },
  { id = "RUSTSEC-2025-0052", reason = "Transitive via gpui; review by 2026-08-01" },
  { id = "RUSTSEC-2024-0384", reason = "Transitive via gpui; review by 2026-08-01" },
  { id = "RUSTSEC-2024-0436", reason = "Transitive via gpui; review by 2026-08-01" },
]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
